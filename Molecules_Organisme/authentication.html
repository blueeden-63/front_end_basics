<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        
        <!-- CONNEXION -->
        <div class="card" style="margin-bottom: 40px;">
          <div class="card-body">
            <h3 class="card-title text-center">Connexion</h3>
            <form>
              <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="votre@email.com">
              </div>
              <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" class="form-control" placeholder="••••••">
              </div>
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Se souvenir de moi</label>
              </div>
              <button type="submit" class="btn btn-primary btn-block mt-3">Se connecter</button>
              <a href="#" class="d-block text-center mt-2">Mot de passe oublié?</a>
            </form>
          </div>
        </div>

        <!-- INSCRIPTION -->
        <div class="card">
          <div class="card-body">
            <h3 class="card-title text-center">Inscription</h3>
            <form>
              <div class="form-group">
                <label>Nom complet</label>
                <input type="text" class="form-control" placeholder="Jean Dupont">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="votre@email.com">
              </div>
              <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" class="form-control" placeholder="••••••">
              </div>
              <button type="submit" class="btn btn-primary btn-block">S'inscrire</button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
