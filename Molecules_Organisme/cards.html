<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container mt-5">
    <h2>Cartes - Différents formats</h2>
    
    <!-- Carte simple -->
    <div class="row mt-4">
      <div class="col-md-4">
        <div class="card">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Image">
          <div class="card-body">
            <h5 class="card-title">Carte avec image</h5>
            <p class="card-text">Description de la carte avec image en haut.</p>
            <button class="btn btn-primary">Lire plus</button>
          </div>
        </div>
      </div>

      <!-- Carte sans image -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Carte simple</h5>
            <p class="card-text">Pas d'image, juste du contenu.</p>
            <button class="btn btn-primary">Action</button>
          </div>
        </div>
      </div>

      <!-- Carte horizontale -->
      <div class="col-md-4">
        <div class="card">
          <div class="row g-0">
            <div class="col-md-4">
              <img src="https://via.placeholder.com/100x100" class="img-fluid rounded-start" alt="Avatar">
            </div>
            <div class="col-md-8">
              <div class="card-body">
                <h5 class="card-title">Carte horizontale</h5>
                <p class="card-text">Image à gauche, texte à droite.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
