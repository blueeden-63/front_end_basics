<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container mt-5">
    <h2>Section des événements populaires</h2>
    
    <!-- Grille de cartes -->
    <div class="row mt-4">
      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Événement 1">
          <div class="card-body">
            <h5 class="card-title">Conférence Tech</h5>
            <p class="card-text text-muted"><i class="fas fa-calendar"></i> 25 Mars 2026</p>
            <p class="card-text text-muted"><i class="fas fa-map-marker-alt"></i> Paris</p>
            <p class="card-text"><strong>49€</strong></p>
          </div>
          <div class="card-footer bg-white">
            <button class="btn btn-primary btn-sm btn-block">Voir détails</button>
          </div>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Événement 2">
          <div class="card-body">
            <h5 class="card-title">Atelier Cuisine</h5>
            <p class="card-text text-muted"><i class="fas fa-calendar"></i> 30 Mars 2026</p>
            <p class="card-text text-muted"><i class="fas fa-map-marker-alt"></i> Lyon</p>
            <p class="card-text"><strong>35€</strong></p>
          </div>
          <div class="card-footer bg-white">
            <button class="btn btn-primary btn-sm btn-block">Voir détails</button>
          </div>
        </div>
      </div>

      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Événement 3">
          <div class="card-body">
            <h5 class="card-title">Meetup Design</h5>
            <p class="card-text text-muted"><i class="fas fa-calendar"></i> 15 Avril 2026</p>
            <p class="card-text text-muted"><i class="fas fa-map-marker-alt"></i> Toulouse</p>
            <p class="card-text"><strong>Gratuit</strong></p>
          </div>
          <div class="card-footer bg-white">
            <button class="btn btn-primary btn-sm btn-block">Voir détails</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
